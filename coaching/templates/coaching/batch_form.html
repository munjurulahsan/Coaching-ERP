{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7fb; color: #1f2937; min-height: 100vh; }
        .page-header,
        .form-panel { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06); }
        .page-header { padding: 20px 22px; }
        .form-panel { padding: 24px; }
        .page-title { font-size: 2rem; font-weight: 800; }
        .form-control, .form-select, .btn { border-radius: 8px; }
    </style>
    <link href="{% static 'coaching/mobile.css' %}" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="page-header d-flex flex-wrap gap-3 justify-content-between align-items-center mb-4">
            <div>
                <h1 class="page-title mb-1">{{ title }}</h1>
                <p class="text-muted mb-0">Create or update batch schedule, name, and roll start.</p>
            </div>
            <a href="{% url 'batch_list' %}" class="btn btn-outline-secondary">Back to Batch List</a>
        </div>

        <div class="form-panel">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Batch Name</label>
                    {{ form.name }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Schedule</label>
                    {{ form.time }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Start Roll</label>
                    {{ form.start_roll }}
                    <div class="form-text">First student roll for this batch. After that, rolls auto-generate one by one.</div>
                </div>
                <div class="d-flex flex-wrap gap-2 justify-content-end">
                    <a href="{% url 'batch_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">{{ submit_text }}</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Easy Chemistry For HSC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7fb; min-height: 100vh; color: #1f2937; }
        .login-card { max-width: 430px; border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08); }
        .brand-mark { width: 52px; height: 52px; border-radius: 8px; background: #0d6efd; color: #ffffff; display: inline-flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .form-control { border-radius: 8px; border-color: #d9e1ec; }
        .btn-main { background: #0d6efd; border: none; color: #ffffff; border-radius: 8px; }
        .btn-main:hover { background: #0b5ed7; color: #ffffff; }
    </style>
</head>
<body>
    <div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
        <div class="card login-card p-4 w-100">
            <div class="text-center mb-4">
                <div class="brand-mark mb-3"><i class="fas fa-flask"></i></div>
                <h1 class="h4 fw-bold mb-1">Easy Chemistry For HSC</h1>
                <p class="text-muted mb-0">Sign in to access the dashboard.</p>
            </div>

            {% if form.errors %}
                <div class="alert alert-danger">Invalid username or password.</div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">
                <div class="mb-3">
                    <label class="form-label" for="{{ form.username.id_for_label }}">Username</label>
                    <input type="text" name="{{ form.username.html_name }}" id="{{ form.username.id_for_label }}" class="form-control" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label" for="{{ form.password.id_for_label }}">Password</label>
                    <input type="password" name="{{ form.password.html_name }}" id="{{ form.password.id_for_label }}" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-main w-100 py-2">
                    <i class="fas fa-lock me-2"></i>Login
                </button>
            </form>
        </div>
    </div>
</body>
</html>

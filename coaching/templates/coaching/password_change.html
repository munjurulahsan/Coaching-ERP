<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Easy Chemistry For HSC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7fb; min-height: 100vh; color: #1f2937; }
        .password-card { max-width: 520px; border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08); }
        .brand-mark { width: 52px; height: 52px; border-radius: 8px; background: #0d6efd; color: #ffffff; display: inline-flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .form-control { border-radius: 8px; border-color: #d9e1ec; }
        .btn-main { background: #0d6efd; border: none; color: #ffffff; border-radius: 8px; }
        .btn-main:hover { background: #0b5ed7; color: #ffffff; }
        .btn-outline-soft { border-color: #d7e2f2; color: #1f2937; border-radius: 8px; }
        .btn-outline-soft:hover { background: #eef4ff; border-color: #bcd2f7; color: #0d6efd; }
        .errorlist { color: #dc3545; margin: 0.35rem 0 0; padding-left: 1.25rem; }
        .helptext { display: block; color: #6b7280; font-size: 0.86rem; margin-top: 0.35rem; }
    </style>
</head>
<body>
    <div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
        <div class="card password-card p-4 w-100">
            <div class="text-center mb-4">
                <div class="brand-mark mb-3"><i class="fas fa-key"></i></div>
                <h1 class="h4 fw-bold mb-1">Change Password</h1>
                <p class="text-muted mb-0">Update the password for {{ request.user.username }}.</p>
            </div>

            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                        <input
                            type="password"
                            name="{{ field.html_name }}"
                            id="{{ field.id_for_label }}"
                            class="form-control"
                            required
                            {% if forloop.first %}autofocus{% endif %}
                        >
                        {{ field.errors }}
                        {% if field.help_text %}
                            <span class="helptext">{{ field.help_text }}</span>
                        {% endif %}
                    </div>
                {% endfor %}

                <div class="d-flex flex-wrap gap-2 mt-4">
                    <button type="submit" class="btn btn-main flex-grow-1">
                        <i class="fas fa-check me-2"></i>Save Password
                    </button>
                    <a href="{% url 'home' %}" class="btn btn-outline-soft">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

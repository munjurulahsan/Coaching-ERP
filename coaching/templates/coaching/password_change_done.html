<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Changed - Easy Chemistry For HSC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7fb; min-height: 100vh; color: #1f2937; }
        .message-card { max-width: 460px; border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08); }
        .brand-mark { width: 52px; height: 52px; border-radius: 8px; background: #198754; color: #ffffff; display: inline-flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .btn-main { background: #0d6efd; border: none; color: #ffffff; border-radius: 8px; }
        .btn-main:hover { background: #0b5ed7; color: #ffffff; }
    </style>
</head>
<body>
    <div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
        <div class="card message-card p-4 w-100 text-center">
            <div class="brand-mark mx-auto mb-3"><i class="fas fa-check"></i></div>
            <h1 class="h4 fw-bold mb-2">Password Changed</h1>
            <p class="text-muted mb-4">Your new password is active now.</p>
            <a href="{% url 'home' %}" class="btn btn-main w-100 py-2">
                <i class="fas fa-home me-2"></i>Back to Dashboard
            </a>
        </div>
    </div>
</body>
</html>
